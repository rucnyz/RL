# GRPO RL on SWE-bench / SWE-Smith with Qwen3.5-9B-Base on 1 node × 8 GPUs.
#
# Lineage:
#   - Training stack borrowed from `grpo-qwen3.5-9b-1n8g-megatron.yaml`
#     (Qwen3.5 + Megatron + 1 node).
#   - SWE agent + RL token capture borrowed from
#     `super-v3:examples/configs/recipes/llm/performance/grpo-nemotron-nano-16n8g-async-1off-swe.yaml`
#     (NeMo Gym + swebench_openhands_training.yaml + async GRPO).
#   - Scaled down from super-v3's 16 nodes to 1 node H200, model swapped from
#     Nemotron-Nano-30B-A3B (MoE) to Qwen3.5-9B-Base (dense). Drops the MoE
#     parallelism / MTP knobs the super-v3 recipe needed for Nemotron.
#
# Why this exists:
#   The rllm + harbor + verl + fully_async path we previously tried has multiple
#   open bugs — most fundamentally, mini-swe-agent's litellm calls don't request
#   logprobs, so rllm-model-gateway captures empty traces and verl ends up with
#   0-token batches (`IndexError` in `karmarkar_karp`). NeMo Gym's responses_api
#   agent (NemoGymLLM + Terminus-2/OpenHands wrappers) is explicitly designed
#   for RL token capture (`collect_rollout_details: true` in harbor_agent.yaml,
#   same pattern in swe_agents).
#
# Prerequisites:
#   - 8× H200 (or any 8× ≥80 GB GPUs; reduce TP/gpu_mem_util otherwise).
#   - Apptainer/Singularity installed locally; SWE-bench `.sif` images
#     prebuilt and pointed to via `swe_agents.container_formatter`.
#   - `uv sync --all-groups --extra nemo_gym` from the NeMo RL repo root.
#   - `git submodule update --init --recursive` so `3rdparty/Gym-workspace/Gym`
#     is populated.
#
# Run:
#   python examples/nemo_gym/run_grpo_nemo_gym.py \
#     --config examples/configs/recipes/llm/grpo-qwen3.5-9b-1n8g-swe.yaml \
#     data.train.data_path=$DATA_DIR/swe_train.jsonl \
#     data.validation.data_path=$DATA_DIR/swe_val.jsonl \
#     env.nemo_gym.swe_agents_train.responses_api_agents.swe_agents.container_formatter=/path/to/swebench/{instance_id}.sif

defaults: ../../grpo_math_1B.yaml

checkpointing:
  enabled: true
  checkpoint_dir: results/grpo-qwen3.5-9b-1n8g-swe
  metric_name: val:total_reward/mean
  higher_is_better: true
  keep_top_k: 5
  save_period: 5
  checkpoint_must_save_by: null
  model_save_format: safetensors
  save_consolidated: false

grpo:
  # 1-node scaled-down version of super-v3 SWE recipe.
  # 16-node super-v3 used: prompts=2, gens=32 → 64 trajectories per step.
  # On 1 node we reduce both for fit + faster smoke tests.
  num_prompts_per_step: 1
  num_generations_per_prompt: 8
  num_val_generations_per_prompt: 1
  # SWE rollouts are inherently multi-turn (handled inside the agent loop);
  # max_rollout_turns at the GRPO level stays 1 (one trajectory per prompt).
  max_rollout_turns: 1
  max_num_epochs: 1
  max_num_steps: 5  # smoke test default; bump for real runs
  normalize_rewards: true
  use_leave_one_out_baseline: true
  advantage_clip_low: -100
  advantage_clip_high: 100
  val_period: 100
  val_at_start: false
  val_at_end: false
  overlong_filtering: true
  max_val_samples: null
  val_batch_size: 32
  seed: 42
  invalid_tool_call_strategy: ""

  use_dynamic_sampling: false
  dynamic_sampling_max_gen_batches: 10
  batch_multiplier: 1

  penalize_invalid_tool_call: true
  invalid_tool_call_advantage: -5.0
  penalize_malformed_thinking: false  # Qwen3.5 base is not a reasoning model
  malformed_thinking_advantage: -5.0

  reward_shaping:
    enabled: false
    overlong_buffer_length: 128
    overlong_buffer_penalty: 1
    max_response_length: ${policy.max_total_sequence_length}
    stop_properly_penalty_coef: null
  reward_scaling:
    enabled: false
    source_min: 0.0
    source_max: 1.0
    target_min: 0.0
    target_max: 1.0

  async_grpo:
    # Match super-v3's async setup — this is what makes long-horizon SWE
    # rollouts overlap with training.
    enabled: true
    max_trajectory_age_steps: 1
    in_flight_weight_updates: true
    recompute_kv_cache_after_weight_updates: false

  seq_logprob_error_threshold: 2

loss_fn:
  reference_policy_kl_penalty: 0.0
  reference_policy_kl_type: k3
  kl_input_clamp_value: null
  kl_output_clamp_value: null

  # DAPO-style asymmetric clip (super-v3 uses these on Nemotron; carry over).
  ratio_clip_min: 0.2
  ratio_clip_max: 0.28
  ratio_clip_c: null
  use_on_policy_kl_approximation: true
  use_importance_sampling_correction: true
  truncated_importance_sampling_ratio: 5.0
  truncated_importance_sampling_ratio_min: null
  truncated_importance_sampling_type: tis
  sequence_level_importance_ratios: false
  token_level_loss: true
  force_on_policy_ratio: true
  use_kl_in_reward: false

policy:
  model_name: Qwen/Qwen3.5-9B-Base
  tokenizer:
    name: ${policy.model_name}
    chat_template_kwargs: null
  hf_config_overrides: {}
  train_global_batch_size: ${mul:${grpo.num_prompts_per_step}, ${grpo.num_generations_per_prompt}}
  train_micro_batch_size: 1
  generation_batch_size: 8
  logprob_batch_size: 1
  # Qwen3.5-9B native max_position_embeddings = 262144. We start at 50k for
  # smoke tests; SWE multi-turn trajectories rarely cross 50k. Bump to 131072
  # once you have stable smoke runs.
  max_total_sequence_length: 50000
  precision: bfloat16
  logprob_chunk_size: 2048
  offload_optimizer_for_logprob: false

  dtensor_cfg:
    _v2: true
    enabled: false
    cpu_offload: False
    sequence_parallel: false
    activation_checkpointing: false
    tensor_parallel_size: 1
    context_parallel_size: 1
    custom_parallel_plan: null

  megatron_cfg:
    enabled: true
    empty_unused_memory_level: 1
    activation_checkpointing: true
    # Qwen3.5-9B is dense (32 layers, hidden=4096). On 1×8 H200 we use TP=4
    # (matches the math recipe baseline). DP=2 over the remaining 2 ranks.
    tensor_model_parallel_size: 4
    expert_tensor_parallel_size: 1
    expert_model_parallel_size: 1  # dense model, no MoE
    pipeline_model_parallel_size: 1
    num_layers_in_first_pipeline_stage: null
    num_layers_in_last_pipeline_stage: null
    context_parallel_size: 1
    pipeline_dtype: ${policy.precision}
    sequence_parallel: true
    # MoE knobs left at safe no-ops because Qwen3.5-9B-Base is dense.
    freeze_moe_router: true
    moe_router_dtype: fp32
    moe_router_load_balancing_type: none
    moe_router_bias_update_rate: 0.0
    moe_permute_fusion: true
    moe_enable_deepep: false
    moe_token_dispatcher_type: alltoall
    moe_aux_loss_coeff: 0.0
    moe_router_enable_expert_bias: false
    moe_shared_expert_overlap: false
    apply_rope_fusion: true
    bias_activation_fusion: false
    defer_fp32_logits: true
    moe_per_layer_logging: false

    mtp_loss_scaling_factor: 0.0
    mtp_use_repeated_layer: false
    mtp_num_layers: 0
    mtp_detach_heads: true

    optimizer:
      optimizer: adam
      lr: 1.0e-6
      min_lr: 1.0e-6
      weight_decay: 0.0
      bf16: true
      fp16: false
      params_dtype: float32

      adam_beta1: 0.9
      adam_beta2: 0.999
      adam_eps: 1e-8
      sgd_momentum: 0.9

      use_distributed_optimizer: true
      use_precision_aware_optimizer: true
      clip_grad: ${policy.max_grad_norm}

      optimizer_cpu_offload: false
      optimizer_offload_fraction: 0.0

    scheduler:
      start_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      end_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      weight_decay_incr_style: constant
      lr_decay_style: constant
      lr_decay_iters: null
      lr_warmup_iters: 5
      lr_warmup_init: 3e-7

    distributed_data_parallel_config:
      grad_reduce_in_fp32: false
      overlap_grad_reduce: true
      overlap_param_gather: true
      use_custom_fsdp: false
      data_parallel_sharding_strategy: optim_grads_params

    fp8_cfg:
      enabled: false
      fp8: e4m3
      fp8_recipe: blockwise
      fp8_param: false

    env_vars: null

  dynamic_batching:
    enabled: false
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.logprob_batch_size}}
    sequence_length_round: 64

  sequence_packing:
    enabled: true
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.logprob_batch_size}}
    algorithm: modified_first_fit_decreasing
    sequence_length_round: 64

  make_sequence_length_divisible_by: 8
  max_grad_norm: 1.0

  optimizer: null
  scheduler: null

  generation:
    port_range_low: 11001
    port_range_high: 15000
    backend: vllm
    max_new_tokens: ${policy.max_total_sequence_length}
    temperature: 1.0
    top_p: 1.0
    top_k: null
    stop_token_ids: null
    stop_strings: null
    vllm_cfg:
      enable_prefix_caching: true
      async_engine: true
      precision: ${policy.precision}
      kv_cache_dtype: auto
      tensor_parallel_size: 4
      pipeline_parallel_size: 1
      expert_parallel_size: 1
      gpu_memory_utilization: 0.6
      max_model_len: ${policy.max_total_sequence_length}
      enforce_eager: false
      use_deep_gemm: false
      num_last_layers_in_bf16: 0
      num_first_layers_in_bf16: 0
      enable_vllm_metrics_logger: true
      vllm_metrics_logger_interval: 0.5
      expose_http_server: true
      skip_tokenizer_init: false
      # Qwen3.5-9B-Base is not instruction-tuned and has no thinking format.
      enable_thinking: false
      http_server_serving_chat_kwargs:
        # SWE agents (OpenHands CodexAgent / OpenCodeAgent / CodeActAgent) use
        # OpenAI tool-calling. qwen3_coder parser handles Qwen tool format.
        enable_auto_tools: true
        tool_parser: qwen3_coder

    vllm_kwargs:
      compilation_config:
        cudagraph_capture_sizes: [1, 2, 4, 8, 16]
    colocated:
      # 1-node colocated (training and generation share the 8 GPUs).
      enabled: true
      resources:
        gpus_per_node: null
        num_nodes: null

data:
  max_input_seq_length: null
  shuffle: false
  num_workers: 1
  train:
    # JSONL produced by `python 3rdparty/Gym-workspace/Gym/scripts/ng_prepare_data.py`
    # for SWE-Gym (training) — see swebench_openhands_training.yaml `datasets:` section.
    data_path: ???
  validation:
    # SWE-Bench Verified (validation).
    data_path: ???
  default:
    dataset_name: NemoGymDataset
    env_name: nemo_gym
    prompt_file: null
    system_prompt_file: null
    processor: nemo_gym_data_processor

# Path to the directory holding prebuilt SWE-bench `.sif` images. Set this on
# the CLI: `+sif_dir=/path/to/sifs`.
sif_dir: ""

env:
  should_use_nemo_gym: true
  should_log_nemo_gym_responses: false
  nemo_gym:
    skip_venv_if_present: true
    port_range_low: 15001
    port_range_high: 20000
    config_paths:
      # Inherits NeMo Gym's vllm model server + SWE agent training config.
      # `responses_api_agents/swe_agents/configs/swebench_openhands_training.yaml`
      # wires up CodexAgent / OpenCodeAgent / CodeActAgent (OpenHands variants)
      # with collect_rollout_details=true so per-token logprobs flow back into
      # NeMo RL — that's what fixes the "0-token batch" failure mode rllm hit.
      - responses_api_models/vllm_model/configs/vllm_model_for_training.yaml
      - responses_api_agents/swe_agents/configs/swebench_openhands_training.yaml
    swe_agents_train:
      responses_api_agents:
        swe_agents:
          # 200 turns matches super-v3 — long enough for real bug fixes.
          agent_max_turns: 200
          # 16 = num_generations_per_prompt × small concurrency budget (1 node).
          # super-v3 used 768 with 16 nodes; ~50 per node here.
          concurrency: 16
          swebench_agent_timeout: 3600
          run_with_mixed_prompts: true
          dataset_path: ${data.train.data_path}
          # Set on the CLI:
          #   `env.nemo_gym.swe_agents_train.responses_api_agents.swe_agents.container_formatter=/path/to/swebench/{instance_id}.sif`
          container_formatter: null
    swe_agents_val:
      responses_api_agents:
        swe_agents:
          agent_max_turns: 200
          concurrency: 16
          swebench_agent_timeout: 3600
          dataset_path: ${data.validation.data_path}
          container_formatter: ${env.nemo_gym.swe_agents_train.responses_api_agents.swe_agents.container_formatter}
    use_absolute_ip: true

logger:
  log_dir: logs/grpo-qwen3.5-9b-1n8g-swe
  num_val_samples_to_print: 0
  wandb_enabled: true
  wandb:
    project: nemo-rl
    name: grpo-qwen3.5-9b-1n8g-swe
  tensorboard_enabled: true
  tensorboard: {}
  mlflow_enabled: false
  mlflow:
    experiment_name: grpo-qwen3.5-9b-swe
    run_name: grpo-qwen3.5-9b-swe
  swanlab_enabled: false
  monitor_gpus: true
  gpu_monitoring:
    collection_interval: 10
    flush_interval: 10

cluster:
  gpus_per_node: 8
  num_nodes: 1
