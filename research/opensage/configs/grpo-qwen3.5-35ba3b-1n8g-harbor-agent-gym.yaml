defaults: ../../../examples/nemo_gym/grpo_workplace_assistant_nemotron_nano_v2_9b.yaml

# OpenSage Harbor via NemoGym using harbor_agent directly (1 node, 8 GPUs)
# This uses NemoGym's built-in harbor_agent instead of our custom agent server.
#
# Prepare data:  uv run python prepare_harbor_data.py --tasks swebench-verified --alias swebench -o data/harbor_agent_data.jsonl
# Run:           uv run python run_grpo_gym.py --config configs/grpo-qwen3.5-35ba3b-1n8g-harbor-agent-gym.yaml

grpo:
  num_prompts_per_step: 8
  num_generations_per_prompt: 4
  max_rollout_turns: 1
  skip_reference_policy_logprobs_calculation: true
  val_at_start: false

  async_grpo:
    enabled: false

checkpointing:
  checkpoint_dir: results/grpo-qwen3.5-35ba3b-harbor-agent-gym

policy:
  model_name: Qwen/Qwen3.5-35B-A3B-Base
  train_global_batch_size: 32
  train_micro_batch_size: 1
  logprob_batch_size: 1
  max_total_sequence_length: 4096

  dtensor_cfg:
    enabled: false
  optimizer: null
  scheduler: null

  megatron_cfg:
    enabled: true
    tensor_model_parallel_size: 1
    expert_model_parallel_size: 8
    moe_token_dispatcher_type: allgather
    apply_rope_fusion: false
    activation_checkpointing: true
    defer_fp32_logits: true

  sequence_packing:
    enabled: false
  dynamic_batching:
    enabled: true

  generation:
    vllm_cfg:
      async_engine: true
      tensor_parallel_size: 8
      enforce_eager: true
      expose_http_server: true
      skip_tokenizer_init: false
      http_server_serving_chat_kwargs:
        enable_auto_tools: true
        tool_parser: qwen3_xml

    colocated:
      enabled: true

data:
  max_input_seq_length: null
  shuffle: true
  num_workers: 0

  train:
    data_path: data/harbor_agent_data.jsonl
  validation: null
  default:
    dataset_name: NemoGymDataset
    env_name: nemo_gym
    prompt_file: null
    system_prompt_file: null
    processor: nemo_gym_data_processor

env:
  should_use_nemo_gym: true
  should_log_nemo_gym_responses: true
  nemo_gym:
    rollout_max_attempts_to_avoid_lp_nan: 1
    config_paths:
    - responses_api_models/vllm_model/configs/vllm_model_for_training.yaml
    - responses_api_agents/harbor_agent/configs/harbor_agent.yaml
    policy_model:
      responses_api_models:
        vllm_model:
          uses_reasoning_parser: false
          extra_body:
            chat_template_kwargs:
              enable_thinking: false
    # Override harbor_agent settings for our setup
    harbor_agent:
      responses_api_agents:
        harbor_agent:
          concurrency: 32
          harbor_datasets:
            swebench:
              local_dataset_path: /scratch/yuzhou/.cache/harbor/tasks/swebench-verified
          harbor_agent_name: terminus-2
          harbor_agent_import_path: null
          harbor_agent_kwargs:
            max_turns: 20
            interleaved_thinking: true
            enable_summarize: false
            collect_rollout_details: true
            trajectory_config:
              raw_content: true
            model_info:
              max_input_tokens: 4096
              max_output_tokens: 4096
          # Use Docker instead of Singularity
          harbor_environment_type: docker
          harbor_environment_import_path: null
          harbor_environment_kwargs: {}
          harbor_agent_max_timeout: 900
          harbor_jobs_dir: jobs

logger:
  wandb_enabled: true
  tensorboard_enabled: true
  wandb:
    project: opensage-rl
    name: grpo-qwen3.5-35ba3b-harbor-agent-gym

cluster:
  gpus_per_node: 8
  num_nodes: 1
