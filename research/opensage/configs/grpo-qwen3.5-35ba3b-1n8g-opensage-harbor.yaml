defaults: ../../../examples/configs/grpo_math_1B.yaml

# OpenSage Harbor environment with Qwen3.5-35B-A3B (1 node, 8 GPUs, Megatron)
# All Qwen3.5/megatron/opensage overrides are explicit below.
#
# Prepare prompts: uv run python prepare_harbor_prompts.py --tasks swebench-verified -o data/harbor_prompts.jsonl
# Run:             uv run python run_grpo.py --config configs/grpo-qwen3.5-35ba3b-1n8g-opensage-harbor.yaml

grpo:
  max_rollout_turns: 30
  num_prompts_per_step: 8
  num_generations_per_prompt: 4

checkpointing:
  checkpoint_dir: results/grpo-qwen3.5-35ba3b-opensage-harbor

policy:
  model_name: Qwen/Qwen3.5-35B-A3B-Base
  train_micro_batch_size: 1
  logprob_batch_size: 1
  max_total_sequence_length: 4096

  # Disable DTensor (use Megatron instead)
  dtensor_cfg:
    enabled: false

  # Megatron config for Qwen3.5-35B-A3B MoE
  megatron_cfg:
    enabled: true
    expert_model_parallel_size: 8
    moe_token_dispatcher_type: allgather
    apply_rope_fusion: false
    activation_checkpointing: true
    defer_fp32_logits: true

  sequence_packing:
    enabled: false
  dynamic_batching:
    enabled: true

  generation:
    vllm_cfg:
      tensor_parallel_size: 8
      enforce_eager: true
    colocated:
      enabled: true

# OpenSage data
data:
  train:
    dataset_name: OpenSageDataset
    data_path: research/opensage/data/harbor_prompts.jsonl
    input_key: prompt
  default:
    processor: opensage_data_processor
    env_name: opensage
    prompt_file: null

# OpenSage environment
env:
  opensage:
    tasks_dir: swebench-verified
    max_turns: 30
    test_timeout: 120

logger:
  wandb_enabled: true
  tensorboard_enabled: true
  wandb:
    project: opensage-rl
    name: grpo-qwen3.5-35ba3b-opensage-harbor

cluster:
  gpus_per_node: 8
  num_nodes: 1
