# NemoGym config for OpenSage resources server
opensage:
  resources_servers:
    opensage_resources_server:
      entrypoint: app.py
      domain: agent
      verified: false
      description: OpenSage Docker sandbox tool execution and Harbor test verification
      tasks_dir: swebench-verified
      test_timeout: 120
      docker_image_prefix: opensage_gym

opensage_simple_agent:
  responses_api_agents:
    simple_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: opensage_resources_server
      model_server:
        type: responses_api_models
        name: policy_model
      datasets:
      - name: harbor_train
        type: train
        jsonl_fpath: research/opensage/data/harbor_prompts.jsonl
