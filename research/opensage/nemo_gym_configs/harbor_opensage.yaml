# NemoGym config for OpenSage Harbor resources server
harbor_opensage:
  resources_servers:
    harbor_opensage:
      entrypoint: opensage_resources_server.py
      entrypoint_base_dir: research/opensage
      domain: agent
      verified: false
      description: Harbor task execution with Docker sandbox (OpenSage)
      tasks_dir: swebench-verified
      test_timeout: 120
      docker_image_prefix: opensage_gym

harbor_opensage_simple_agent:
  responses_api_agents:
    simple_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: harbor_opensage
      model_server:
        type: responses_api_models
        name: policy_model
      datasets:
      - name: harbor_train
        type: train
        jsonl_fpath: research/opensage/data/harbor_prompts.jsonl
