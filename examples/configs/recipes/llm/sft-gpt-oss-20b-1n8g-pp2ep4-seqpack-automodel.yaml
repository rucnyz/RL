defaults: ./sft-gpt-oss-20b-1n8g-pp2ep4-automodel.yaml
sft:
  val_at_start: false
  val_at_end: false
policy:
  sequence_packing:
    enabled: true
  # PP config inherits pp_schedule: 1f1b, pp_microbatch_size: 4 from parent.
  # With train_micro_batch_size=8 and pp_microbatch_size=4:
  #   n_microbatches = 8/4 = 2, which satisfies 1f1b's n_microbatches >= pp_size.
  # pack_for_thd creates 2 packed rows of 4 sequences each.
checkpointing:
  checkpoint_dir: results/sft-gpt-oss-20b-1n8g-pp2ep4-seqpack-automodel
