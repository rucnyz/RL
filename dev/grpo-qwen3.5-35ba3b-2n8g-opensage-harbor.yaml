defaults: ../examples/configs/recipes/llm/grpo-qwen3.5-35ba3b-2n8g-automodel-ep16.yaml

# Override math env with opensage harbor env
# Prepare prompts first: uv run --extra opensage python dev/prepare_harbor_prompts.py --tasks swebench -o dev/data/harbor_prompts.jsonl
grpo:
  max_rollout_turns: 30
  num_prompts_per_step: 8
  num_generations_per_prompt: 4

checkpointing:
  checkpoint_dir: results/grpo-qwen3.5-35ba3b-2n8g-opensage-harbor

data:
  train:
    dataset_name: ResponseDataset
    data_path: dev/data/harbor_prompts.jsonl
    input_key: prompt
  default:
    processor: opensage_data_processor
    env_name: opensage
    prompt_file: null

env:
  opensage:
    tasks_dir: swebench
    max_turns: 30
    test_timeout: 120

logger:
  wandb_enabled: true
  tensorboard_enabled: true
  wandb:
    project: opensage-rl
    name: grpo-qwen3.5-35ba3b-opensage-harbor
