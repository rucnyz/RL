defaults: ../examples/configs/recipes/llm/grpo-qwen3.5-35ba3b-2n8g-automodel-ep16.yaml

# Override math env with opensage harbor env
# Prepare prompts first: uv run --extra opensage python dev/prepare_harbor_prompts.py --tasks swebench -o dev/data/harbor_prompts.jsonl
grpo:
  max_rollout_turns: 30
  num_prompts_per_step: 8
  num_generations_per_prompt: 4

checkpointing:
  checkpoint_dir: results/grpo-qwen3.5-35ba3b-2n8g-opensage-harbor
policy:
  model_name: Qwen/Qwen3.5-35B-A3B-Base
  train_micro_batch_size: 1
  logprob_batch_size: 1
  max_total_sequence_length: 4096
  dtensor_cfg:
    expert_parallel_size: 8
    activation_checkpointing: true
    env_vars:
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
    automodel_kwargs:
      backend:
        _target_: nemo_automodel.components.models.common.utils.BackendConfig
        attn: te
        linear: te
        rms_norm: te
        enable_deepep: true
        fake_balanced_gate: false
        rope_fusion: false
        enable_hf_state_dict_adapter: true
  sequence_packing:
    enabled: false
  dynamic_batching:
    enabled: true
  generation:
    vllm_cfg:
      tensor_parallel_size: 8
      # set to eager mode to mitigate https://github.com/vllm-project/vllm/issues/36237
      enforce_eager: true
  colocated:
    # true: generation shares training GPUs
    # false: uses dedicated generation resources
    enabled: true
    # only relevant when enabled is false
    resources:
      gpus_per_node: null # Decides num gpus to be dedicated to generation when there is one node in the cluster i.e cluster.num_nodes == 1
      num_nodes: null # Decides number of nodes to be dedicated to generation
data:
  train:
    dataset_name: OpenSageDataset
    data_path: dev/data/harbor_prompts.jsonl
    input_key: prompt
  default:
    processor: opensage_data_processor
    env_name: opensage
    prompt_file: null

env:
  opensage:
    tasks_dir: swebench-verified
    max_turns: 30
    test_timeout: 120

logger:
  wandb_enabled: true
  tensorboard_enabled: true
  wandb:
    project: opensage-rl
    name: grpo-qwen3.5-35ba3b-opensage-harbor
cluster:
  gpus_per_node: 8
  num_nodes: 1